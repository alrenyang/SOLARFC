<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLAR FC - 로그인 & 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .login-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .logo-area { margin-bottom: 25px; }
        .logo-area .icon { font-size: 44px; margin-bottom: 8px; }
        .logo-area h2 { font-size: 24px; font-weight: 700; color: #111; }
        .logo-area p { font-size: 13px; color: #6c757d; margin-top: 5px; white-space: nowrap; }

        /* ── ✨ 3개 탭 메뉴 촘촘하게 한 줄 정렬 ── */
        .tab-menu { 
            display: flex; 
            margin-bottom: 25px; 
            border-bottom: 2px solid var(--border-color); 
            width: 100%;
        }
        .tab-btn {
            flex: 1; padding: 12px 2px; background: none; border: none;
            font-size: clamp(13px, 3.8vw, 15px); font-weight: 500; color: #6c757d; cursor: pointer; outline: none;
            white-space: nowrap;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: -2px;
            font-weight: 700;
        }

        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #495057; }
        .input-group input {
            width: 100%; padding: 14px; font-size: 15px; border: 1px solid var(--border-color);
            border-radius: 8px; background-color: #fff; outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--primary-color); }

        /* 필드 노출 유연화 제어용 클래스 */
        .hidden-field { display: none; }

        .btn-submit {
            width: 100%; padding: 14px; font-size: 16px; font-weight: 700; color: #fff;
            background-color: var(--primary-color); border: none; border-radius: 8px;
            cursor: pointer; margin-top: 10px; transition: background-color 0.2s;
        }
        .btn-submit:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="icon">⚽</div>
            <h2>SOLAR FC</h2>
            <p id="sub-title">클럽 회원 관리 시스템</p>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" id="tab-login">로그인</button>
            <button class="tab-btn" id="tab-signup">회원가입</button>
            <button class="tab-btn" id="tab-guest">비회원</button>
        </div>

        <form id="auth-form">
            <div class="input-group hidden-field" id="group-name">
                <label for="user-name">이름</label>
                <input type="text" id="user-name" placeholder="홍길동">
            </div>

            <div class="input-group" id="group-email">
                <label for="user-email" id="label-user-id">아이디</label>
                <input type="text" id="user-email" placeholder="사용할 아이디를 입력하세요">
            </div>

            <div class="input-group" id="group-password">
                <label for="user-password">비밀번호</label>
                <input type="password" id="user-password" placeholder="비밀번호를 입력하세요">
            </div>

            <div class="input-group hidden-field" id="group-phone">
                <label for="user-phone">연락처</label>
                <input type="tel" id="user-phone" placeholder="010-1234-5678" maxlength="13">
            </div>

            <button type="submit" class="btn-submit" id="btn-submit-text">로그인하기</button>
        </form>
    </div>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const tabGuest = document.getElementById('tab-guest');

        const groupName = document.getElementById('group-name');
        const groupEmail = document.getElementById('group-email');
        const groupPassword = document.getElementById('group-password');
        const groupPhone = document.getElementById('group-phone');

        const submitText = document.getElementById('btn-submit-text');
        const subTitleText = document.getElementById('sub-title');

        const inputName = document.getElementById('user-name');
        const inputEmail = document.getElementById('user-email');
        const inputPassword = document.getElementById('user-password');
        const inputPhone = document.getElementById('user-phone');

        // 공통 초기화 처리
        function resetTabs() {
            [tabLogin, tabSignup, tabGuest].forEach(btn => btn.classList.remove('active'));
            [groupName, groupEmail, groupPassword, groupPhone].forEach(div => div.style.display = 'none');
            [inputName, inputEmail, inputPassword, inputPhone].forEach(inp => inp.required = false);
        }

        // 1. [로그인 모드]
        tabLogin.addEventListener('click', () => {
            resetTabs();
            tabLogin.classList.add('active');
            groupEmail.style.display = 'block';
            groupPassword.style.display = 'block';
            inputEmail.required = true;
            inputPassword.required = true;
            submitText.innerText = '로그인하기';
            subTitleText.innerText = '클럽 회원 관리 시스템';
            window.currentAuthMode = 'login';
        });

        // 2. [회원가입 모드]
        tabSignup.addEventListener('click', () => {
            resetTabs();
            tabSignup.classList.add('active');
            groupName.style.display = 'block';
            groupEmail.style.display = 'block';
            groupPassword.style.display = 'block';
            groupPhone.style.display = 'block';
            [inputName, inputEmail, inputPassword, inputPhone].forEach(inp => inp.required = true);
            submitText.innerText = '회원가입 완료하기';
            subTitleText.innerText = '새로운 크루 멤버 등록';
            window.currentAuthMode = 'signup';
        });

        // 3. [비회원 모드 - 이름과 연락처만 사용]
        tabGuest.addEventListener('click', () => {
            resetTabs();
            tabGuest.classList.add('active');
            groupName.style.display = 'block';
            groupPhone.style.display = 'block';
            inputName.required = true;
            inputPhone.required = true;
            submitText.innerText = '비회원으로 입장하기';
            subTitleText.innerText = '임시 게스트 및 비회원 입장';
            window.currentAuthMode = 'guest';
        });

        // 기본 활성 플래그 강제 지정
        window.currentAuthMode = 'login';
        inputEmail.required = true;
        inputPassword.required = true;

        // 연락처 하이픈 자동 연동
        if (inputPhone) {
            inputPhone.addEventListener('input', (e) => {
                let value = e.target.value.replace(/[^0-9]/g, '');
                let result = '';
                if (value.length < 4) result = value;
                else if (value.length < 7) result = value.substr(0, 3) + '-' + value.substr(3);
                else if (value.length < 11) result = value.substr(0, 3) + '-' + value.substr(3, 3) + '-' + value.substr(6);
                else result = value.substr(0, 3) + '-' + value.substr(3, 4) + '-' + value.substr(7);
                e.target.value = result;
            });
        }
    </script>

    <script type="module" src="auth.js"></script>
</body>
</html>
